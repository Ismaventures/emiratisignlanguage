apiVersion: apps/v1
kind: Deployment
metadata:
  name: emirsign-api
  labels:
    app: emirsign-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: emirsign-api
  template:
    metadata:
      labels:
        app: emirsign-api
    spec:
      containers:
        - name: api
          image: emirsign/api:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: emirsign-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: emirsign-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: emirsign-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: emirsign-api
spec:
  selector:
    app: emirsign-api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
