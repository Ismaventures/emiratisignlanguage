apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emirsign-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.emirsign.ai
        - vision.emirsign.ai
      secretName: emirsign-tls
  rules:
    - host: api.emirsign.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: emirsign-api
                port:
                  number: 3001
    - host: vision.emirsign.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: emirsign-vision
                port:
                  number: 8001
