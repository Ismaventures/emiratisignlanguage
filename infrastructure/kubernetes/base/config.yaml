apiVersion: v1
kind: Secret
metadata:
  name: emirsign-secrets
type: Opaque
stringData:
  database-url: "postgresql://emirsign:emirsign_password@postgres:5432/emirsign"
  redis-url: "redis://redis:6379"
  jwt-secret: "change-this-in-production-to-a-very-long-random-string"
  storage-access-key: "minioadmin"
  storage-secret-key: "minioadmin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: emirsign-config
data:
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  STORAGE_ENDPOINT: "minio"
  STORAGE_REGION: "auto"
  STORAGE_USE_SSL: "false"
  VISION_SERVICE_URL: "http://emirsign-vision:8001"
  NLP_SERVICE_URL: "http://emirsign-nlp:8002"
  SPEECH_SERVICE_URL: "http://emirsign-speech:8003"
  CORS_ORIGIN: "https://app.emirsign.ai"
