apiVersion: apps/v1
kind: Deployment
metadata:
  name: emirsign-vision
  labels:
    app: emirsign-vision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: emirsign-vision
  template:
    metadata:
      labels:
        app: emirsign-vision
    spec:
      containers:
        - name: vision
          image: emirsign/vision:latest
          ports:
            - containerPort: 8001
          env:
            - name: DEBUG
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: emirsign-vision
spec:
  selector:
    app: emirsign-vision
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
